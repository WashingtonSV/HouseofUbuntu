<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streetlights NYC — Game Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --amber: #F0A500;
    --amber-dim: #C47F00;
    --amber-glow: rgba(240,165,0,0.12);
    --amber-glow-strong: rgba(240,165,0,0.22);
    --bg: #0A0A0A;
    --surface: #111111;
    --surface-raised: #181818;
    --surface-hover: #1F1F1F;
    --border: rgba(255,255,255,0.07);
    --border-amber: rgba(240,165,0,0.3);
    --text-primary: #F2F0EB;
    --text-secondary: #8A8680;
    --text-tertiary: #4A4845;
    --tag-africa-bg: rgba(30,90,40,0.3);
    --tag-africa-text: #6DBF78;
    --tag-caribbean-bg: rgba(60,40,100,0.35);
    --tag-caribbean-text: #A98EDF;
    --tag-latin-bg: rgba(120,40,20,0.35);
    --tag-latin-text: #E88B6A;
    --tag-asia-bg: rgba(20,60,110,0.35);
    --tag-asia-text: #6AAAE0;
    --tag-nyc-bg: rgba(60,60,60,0.4);
    --tag-nyc-text: #A0A0A0;
    --tag-original-bg: rgba(120,80,0,0.35);
    --tag-original-text: #F0A500;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 2rem 2.5rem 1.5rem;
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 1.25rem;
  }
  .brand {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .brand-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--amber);
  }
  .brand-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--text-primary);
    line-height: 1;
  }
  .brand-sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .add-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--amber);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 10px 18px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .add-btn:hover { background: #FFB800; }
  .add-btn:active { transform: scale(0.97); }
  .add-btn svg { width: 16px; height: 16px; }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-tertiary);
    width: 16px;
    height: 16px;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px 9px 38px;
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input::placeholder { color: var(--text-tertiary); }
  .search-input:focus { border-color: var(--border-amber); }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text-primary); }
  .filter-btn.active { background: var(--amber-glow); border-color: var(--border-amber); color: var(--amber); }

  /* MAIN */
  .main {
    padding: 2rem 2.5rem 4rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  .stats-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .stats-count {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-tertiary);
  }
  .stats-count span { color: var(--amber); }

  .sort-select {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 5px 10px;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    outline: none;
  }
  .sort-select option { background: #1a1a1a; }

  /* GRID */
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }

  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }
  .game-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .game-card:hover { border-color: var(--border-amber); background: var(--surface-hover); transform: translateY(-1px); }
  .game-card:hover::before { opacity: 1; }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .game-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.01em;
    text-transform: uppercase;
    color: var(--text-primary);
    line-height: 1.1;
  }
  .region-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .badge-africa { background: var(--tag-africa-bg); color: var(--tag-africa-text); }
  .badge-caribbean { background: var(--tag-caribbean-bg); color: var(--tag-caribbean-text); }
  .badge-latin { background: var(--tag-latin-bg); color: var(--tag-latin-text); }
  .badge-asia { background: var(--tag-asia-bg); color: var(--tag-asia-text); }
  .badge-nyc { background: var(--tag-nyc-bg); color: var(--tag-nyc-text); }
  .badge-original { background: var(--tag-original-bg); color: var(--tag-original-text); }

  .game-origin {
    font-size: 12px;
    color: var(--text-tertiary);
    font-weight: 500;
    margin-top: -4px;
  }

  .game-desc {
    font-size: 13.5px;
    color: var(--text-secondary);
    line-height: 1.65;
    flex: 1;
  }

  .tags {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--text-tertiary);
    font-weight: 500;
  }

  .phase-note {
    font-size: 12px;
    color: var(--amber-dim);
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-weight: 500;
    display: flex;
    align-items: flex-start;
    gap: 6px;
  }
  .phase-note::before {
    content: '→';
    flex-shrink: 0;
    margin-top: 0px;
  }

  .card-actions {
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.15s;
    position: absolute;
    top: 10px;
    right: 10px;
  }
  .game-card:hover .card-actions { opacity: 1; }
  .action-btn {
    width: 28px;
    height: 28px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--surface-raised);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .action-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text-primary); }
  .action-btn.delete:hover { border-color: rgba(220,60,60,0.4); color: #E55; background: rgba(220,60,60,0.1); }
  .action-btn svg { width: 13px; height: 13px; }

  /* EMPTY STATE */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-tertiary);
  }
  .empty-state p:first-child {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface-raised);
    border: 1px solid var(--border-amber);
    border-radius: 12px;
    padding: 2rem;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(8px);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 900;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 1.5rem;
    letter-spacing: 0.03em;
  }

  .form-grid { display: flex; flex-direction: column; gap: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-tertiary);
  }
  .form-input, .form-select, .form-textarea {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .form-input::placeholder, .form-textarea::placeholder { color: var(--text-tertiary); }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--border-amber); }
  .form-select option { background: #1a1a1a; }
  .form-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .form-hint { font-size: 11px; color: var(--text-tertiary); }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  .btn-cancel {
    padding: 9px 18px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: rgba(255,255,255,0.2); color: var(--text-primary); }
  .btn-save {
    padding: 9px 20px;
    border-radius: 6px;
    border: none;
    background: var(--amber);
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-save:hover { background: #FFB800; }

  /* FOOTER */
  .footer {
    text-align: center;
    padding: 1.5rem;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-tertiary);
    letter-spacing: 0.04em;
  }
  .footer span { color: var(--amber); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="brand">
      <span class="brand-eyebrow">House of Ubuntu</span>
      <h1 class="brand-title">Streetlights NYC</h1>
      <p class="brand-sub">Game Library &amp; Cultural Rolodex</p>
    </div>
    <button class="add-btn" onclick="openModal()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
      Add Game
    </button>
  </div>
  <div class="controls">
    <div class="search-wrap">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
      <input class="search-input" type="text" id="search" placeholder="Search games, origins, tags…" oninput="renderGames()">
    </div>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" data-filter="africa" onclick="setFilter('africa',this)">Africa</button>
      <button class="filter-btn" data-filter="caribbean" onclick="setFilter('caribbean',this)">Caribbean</button>
      <button class="filter-btn" data-filter="latin" onclick="setFilter('latin',this)">Latin America</button>
      <button class="filter-btn" data-filter="asia" onclick="setFilter('asia',this)">Asia</button>
      <button class="filter-btn" data-filter="nyc" onclick="setFilter('nyc',this)">NYC / US</button>
      <button class="filter-btn" data-filter="original" onclick="setFilter('original',this)">Original IP</button>
    </div>
  </div>
</header>

<main class="main">
  <div class="stats-bar">
    <p class="stats-count"><span id="count">0</span> games in library</p>
    <select class="sort-select" id="sort-select" onchange="renderGames()">
      <option value="name">Sort: A–Z</option>
      <option value="region">Sort: Region</option>
      <option value="phase">Sort: Phase</option>
    </select>
  </div>
  <div class="games-grid" id="grid"></div>
</main>

<footer class="footer">
  <span>Streetlights NYC</span> &nbsp;·&nbsp; House of Ubuntu &nbsp;·&nbsp; Washington Strategic Ventures &nbsp;·&nbsp; Confidential 2026
</footer>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <p class="modal-title" id="modal-title">Add Game</p>
    <div class="form-grid">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Game Name *</label>
          <input class="form-input" id="f-name" placeholder="e.g. Ampe">
        </div>
        <div class="form-group">
          <label class="form-label">Region *</label>
          <select class="form-select" id="f-region">
            <option value="">Select region</option>
            <option value="africa">Africa</option>
            <option value="caribbean">Caribbean</option>
            <option value="latin">Latin America</option>
            <option value="asia">Asia</option>
            <option value="nyc">NYC / US</option>
            <option value="original">Original IP</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Cultural Origin / Country *</label>
        <input class="form-input" id="f-origin" placeholder="e.g. Ghana / West Africa">
      </div>
      <div class="form-group">
        <label class="form-label">Description *</label>
        <textarea class="form-textarea" id="f-desc" placeholder="How the game is played, what makes it special, cultural context…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Tags</label>
        <input class="form-input" id="f-tags" placeholder="team, running, no equipment, cultural intro — comma separated">
        <span class="form-hint">Separate with commas. E.g: team, running, no equipment</span>
      </div>
      <div class="form-group">
        <label class="form-label">Phase &amp; Event Notes</label>
        <input class="form-input" id="f-phase" placeholder="e.g. Phase 2+ — great mid-event energy builder">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveGame()">Save Game</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_GAMES = [
  {id:'g1',name:'Ampe',region:'africa',origin:'Ghana / West Africa',desc:'Two players jump and thrust out a leg simultaneously. The one whose foot matches or differs from the leader wins. Fast, rhythmic, endlessly competitive. Requires zero equipment.',tags:['2-player','rhythm','no equipment','competitive'],phase:'Phase 1+ — perfect warm-up or side activation'},
  {id:'g2',name:'Pilolo',region:'africa',origin:'Ghana',desc:'"Time to search for it." One player hides sticks or stones around a defined area; others race to find and return them to a finish line. First back wins. Pure speed and strategy.',tags:['group','seeking','running','low equipment'],phase:'Phase 2+ — great as a timed mid-event game'},
  {id:'g3',name:'Ntore',region:'africa',origin:'Rwanda / Central Africa',desc:'Warrior dance game — movement-based call and response. Leader performs a sequence; group mirrors it with increasing speed. Easily adapted into a play format with elimination rounds.',tags:['movement','call-and-response','group','cultural intro'],phase:'Phase 2+ — powerful cultural moment with a story'},
  {id:'g4',name:'Bati Kub',region:'africa',origin:'Ethiopia / Horn of Africa',desc:'Spinning top competition. Can be adapted into a team format — distance, accuracy, longest spin. Works as a side station with minimal setup. Cultural intro opportunity.',tags:['skill','station game','no running','cultural intro'],phase:'Phase 3+ — side station with cultural framing'},
  {id:'g5',name:'Warri / Oware',region:'caribbean',origin:'Ghana / Caribbean (Antigua, Jamaica)',desc:'Ancient strategy board game played on a carved board with seeds. Deeply embedded in Caribbean and West African culture. Works as a chill station game between active rounds.',tags:['strategy','pairs','seated','cultural bridge'],phase:'Phase 2+ — cool-down station or circle close conversation starter'},
  {id:'g6',name:'Ring-play games',region:'caribbean',origin:'Trinidad / Jamaica / Eastern Caribbean',desc:'Call-and-response circle games with singing, clapping, and movement. Brown Girl in the Ring is the most known. Powerful crowd unifier — nostalgic for Caribbean diaspora, accessible to all.',tags:['circle game','singing','no equipment','all ages'],phase:'Phase 1+ — warm-up or circle close moment'},
  {id:'g7',name:'Danmye / Ladja',region:'caribbean',origin:'Martinique / French Caribbean',desc:'Combat dance game — two players face off in rhythmic, grounded movement. Not fighting — more like a dance battle with rules. Spectacular as a centerpiece crowd moment.',tags:['performance','pairs','crowd moment','cultural intro'],phase:'Phase 3+ — demonstration event with cultural framing'},
  {id:'g8',name:'Trompo',region:'latin',origin:'Mexico / Latin America (widespread)',desc:'Spinning top competition with a string-wound wooden top. Individual skill + team challenges. Easy to set up as a side station. Deeply nostalgic for Mexican and Central American communities.',tags:['skill','station game','cultural intro','pairs'],phase:'Phase 2+ — side station, introduce with origin story'},
  {id:'g9',name:'Rayuela / Hopscotch',region:'latin',origin:'Latin America / Spain',desc:'Chalk-drawn hopscotch with Latin American rule variations — different grid shapes, obstacle rules, stone tosses. Familiar entry point with cultural depth. Zero equipment beyond chalk.',tags:['chalk','solo/group','all fitness','no equipment'],phase:'Phase 0+ — side activation, always available with chalk'},
  {id:'g10',name:'Capoeira movement games',region:'latin',origin:'Brazil (Afro-Brazilian)',desc:'Not full Capoeira — adapted movement challenges inspired by it. Ginga footwork mirroring, call-and-response movement circles, balance challenges. Cultural intro with movement. Stunning crowd visual.',tags:['movement','circle game','cultural intro','no equipment'],phase:'Phase 2+ — facilitated with cultural context'},
  {id:'g11',name:'Encostalada',region:'latin',origin:'Brazil',desc:'Tag variant — when tagged, you\'re frozen with your back against a wall or tree until a teammate tags you free. Fast, spatial, strategic. Excellent energy builder mid-event.',tags:['tag','team','running','energy builder'],phase:'Phase 1+ — mid-event energy game'},
  {id:'g12',name:'Kabaddi (lite format)',region:'asia',origin:'South Asia (India, Bangladesh, Sri Lanka)',desc:'One player crosses into the opponents\' half, tags as many as possible, and must return without being tackled — all in one breath. Explosive. Adapted for casual play with touch-only rules.',tags:['team','running','breath','high drama'],phase:'Phase 2+ — explain origin, demonstrate first'},
  {id:'g13',name:'Sepak Takraw',region:'asia',origin:'Southeast Asia (Thailand, Malaysia, Philippines)',desc:'Volleyball with feet — played over a net using only the feet, knees, chest, and head. Can be adapted as a kick-only challenge game. Spectacular to watch even as a demonstration.',tags:['skill','demonstration','high spectacle','cultural intro'],phase:'Phase 3+ — demo or modified challenge format'},
  {id:'g14',name:'Gilli-Danda',region:'asia',origin:'India / South Asia',desc:'Ancient predecessor to cricket and baseball — a small stick (gilli) is flipped into the air and struck with a longer stick (danda). Can be adapted with safe foam versions. High nostalgia in South Asian communities.',tags:['bat-and-ball','cultural intro','modified equipment','pairs'],phase:'Phase 3+ — modified equipment version, cultural framing'},
  {id:'g15',name:'Stickball',region:'nyc',origin:'New York City (Harlem, East Harlem, South Bronx)',desc:'The original NYC street game. A broomstick and a rubber ball. Played in the street, over manhole covers as bases. Authentically New York. Deeply aligned with Streetlights brand DNA.',tags:['bat-and-ball','NYC-specific','cultural anchor','low equipment'],phase:'Phase 2+ — NYC anchor game alongside kickball'},
  {id:'g16',name:'Skully / Skully caps',region:'nyc',origin:'New York City',desc:'Flicking bottle caps across a chalk-drawn court on pavement. Pure NYC sidewalk culture. Works as a side station. Requires chalk + bottle caps. Deeply nostalgic for any NYC childhood.',tags:['chalk','station game','NYC-specific','pairs/solo'],phase:'Phase 1+ — always-available side station'},
  {id:'g17',name:'Stoopball',region:'nyc',origin:'New York City',desc:'Throwing a rubber ball against a stoop\'s steps. Points for how it bounces back. One player or competitive pairs. No stoop needed — a curb or wall edge works. Pure NYC.',tags:['NYC-specific','solo/pairs','no equipment','cultural anchor'],phase:'Phase 1+ — warm-up or side station'},
  {id:'g18',name:'Manhunt',region:'nyc',origin:'US / NYC neighborhoods',desc:'Hide and seek meets tag — one team hides, the other hunts. Last person found wins. Scales beautifully with park space. Works at dusk for maximum atmosphere. High energy, long duration.',tags:['team','hiding','running','park-scale'],phase:'Phase 2+ — best at dusk. The streetlight moment.'},
  {id:'g19',name:'Streetlights Relay',region:'original',origin:'Original Streetlights NYC IP',desc:'Custom team relay race with culturally specific challenge stations — hand game round, double dutch rotation, four square volley, stoopball target, then sprint to finish. Original format, fully ownable.',tags:['team','relay','multi-game','original IP'],phase:'Phase 2+ — signature Streetlights game format'},
  {id:'g20',name:'Block Gauntlet',region:'original',origin:'Original Streetlights NYC IP',desc:'Squid Game-inspired elimination bracket. Simple rules per round, unexpected challenges, maximum drama. Teams advance through rounds. Final two face off in front of the crowd. Fully original format.',tags:['elimination','bracket','crowd moment','original IP'],phase:'Phase 3+ — tournament anchor game'},
  {id:'g21',name:'Cultural Shuffle',region:'original',origin:'Original Streetlights NYC IP',desc:'Teams rotate through 4 stations — each station is a different cultural game with a 60-second intro on its origin. Points for participation + knowledge. Educational, connective, replayable.',tags:['stations','cultural','teams','educational'],phase:'Phase 2+ — structured multi-culture event format'},
];

const BADGE_CLASS = {africa:'badge-africa',caribbean:'badge-caribbean',latin:'badge-latin',asia:'badge-asia',nyc:'badge-nyc',original:'badge-original'};
const REGION_LABEL = {africa:'Africa',caribbean:'Caribbean',latin:'Latin America',asia:'Asia',nyc:'NYC / US',original:'Original IP'};
const CARD_ACCENT = {africa:'#4EB85A',caribbean:'#9B7ED8',latin:'#D46A45',asia:'#4A98D8',nyc:'#888',original:'#F0A500'};

let currentFilter = 'all';
let editingId = null;

function getGames() {
  try {
    const stored = localStorage.getItem('streetlights_games');
    return stored ? JSON.parse(stored) : [...DEFAULT_GAMES];
  } catch { return [...DEFAULT_GAMES]; }
}

function saveGames(games) {
  try { localStorage.setItem('streetlights_games', JSON.stringify(games)); } catch {}
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGames();
}

function renderGames() {
  const games = getGames();
  const search = document.getElementById('search').value.toLowerCase().trim();
  const sort = document.getElementById('sort-select').value;

  let filtered = games.filter(g => {
    const matchRegion = currentFilter === 'all' || g.region === currentFilter;
    const matchSearch = !search ||
      g.name.toLowerCase().includes(search) ||
      g.origin.toLowerCase().includes(search) ||
      g.desc.toLowerCase().includes(search) ||
      (g.tags || []).some(t => t.toLowerCase().includes(search));
    return matchRegion && matchSearch;
  });

  filtered.sort((a,b) => {
    if (sort === 'name') return a.name.localeCompare(b.name);
    if (sort === 'region') return a.region.localeCompare(b.region) || a.name.localeCompare(b.name);
    if (sort === 'phase') return (a.phase||'').localeCompare(b.phase||'');
    return 0;
  });

  document.getElementById('count').textContent = filtered.length;

  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><p>No games found</p><p>Try a different search or filter, or add a new game.</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(g => {
    const accent = CARD_ACCENT[g.region] || '#888';
    return `
    <div class="game-card" style="border-top: 2px solid ${accent}22;" onclick="noop(event,'${g.id}')">
      <div class="card-top">
        <p class="game-name">${escHtml(g.name)}</p>
        <span class="region-badge ${BADGE_CLASS[g.region]||''}">${REGION_LABEL[g.region]||g.region}</span>
      </div>
      <p class="game-origin">${escHtml(g.origin)}</p>
      <p class="game-desc">${escHtml(g.desc)}</p>
      <div class="tags">${(g.tags||[]).map(t=>`<span class="tag">${escHtml(t)}</span>`).join('')}</div>
      ${g.phase ? `<p class="phase-note">${escHtml(g.phase)}</p>` : ''}
      <div class="card-actions">
        <button class="action-btn" onclick="editGame(event,'${g.id}')" title="Edit">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10L10 2l2 2-8 8H2v-2z"/></svg>
        </button>
        <button class="action-btn delete" onclick="deleteGame(event,'${g.id}')" title="Delete">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="1,3 13,3"/><path d="M5,3V2h4v1"/><path d="M2,3l1,9h8l1-9"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

function noop(e, id) {}

function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openModal(id) {
  editingId = id || null;
  const modal = document.getElementById('modal');
  document.getElementById('modal-title').textContent = id ? 'Edit Game' : 'Add Game';
  if (id) {
    const games = getGames();
    const g = games.find(x => x.id === id);
    if (g) {
      document.getElementById('f-name').value = g.name || '';
      document.getElementById('f-region').value = g.region || '';
      document.getElementById('f-origin').value = g.origin || '';
      document.getElementById('f-desc').value = g.desc || '';
      document.getElementById('f-tags').value = (g.tags||[]).join(', ');
      document.getElementById('f-phase').value = g.phase || '';
    }
  } else {
    ['f-name','f-origin','f-desc','f-tags','f-phase'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-region').value = '';
  }
  modal.classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
}

function closeModalOutside(e) {
  if (e.target.id === 'modal') closeModal();
}

function saveGame() {
  const name = document.getElementById('f-name').value.trim();
  const region = document.getElementById('f-region').value;
  const origin = document.getElementById('f-origin').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  const tagsRaw = document.getElementById('f-tags').value;
  const phase = document.getElementById('f-phase').value.trim();

  if (!name || !region || !origin || !desc) {
    alert('Please fill in Game Name, Region, Cultural Origin, and Description.');
    return;
  }

  const tags = tagsRaw.split(',').map(t=>t.trim()).filter(Boolean);
  const games = getGames();

  if (editingId) {
    const idx = games.findIndex(g => g.id === editingId);
    if (idx > -1) games[idx] = { ...games[idx], name, region, origin, desc, tags, phase };
  } else {
    games.push({ id: 'g' + Date.now(), name, region, origin, desc, tags, phase });
  }

  saveGames(games);
  closeModal();
  renderGames();
}

function editGame(e, id) {
  e.stopPropagation();
  openModal(id);
}

function deleteGame(e, id) {
  e.stopPropagation();
  if (!confirm('Remove this game from the library?')) return;
  const games = getGames().filter(g => g.id !== id);
  saveGames(games);
  renderGames();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

renderGames();
</script>
</body>
</html>
